<!doctype html>
<html>
  <head>
    <meta charset="UTF-8" />
    <title>cart_maker</title>
    <style>
      body {
        font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
        margin: 0;
        padding: 16px;
        width: 280px;
        font-size: 14px;
        color: #0f172a;
      }
      h1 { margin: 0 0 4px; font-size: 16px; font-weight: 600; }
      p.muted { color: #64748b; margin: 0 0 14px; font-size: 12px; line-height: 1.5; }
      button {
        display: block;
        width: 100%;
        padding: 10px 14px;
        margin-bottom: 8px;
        border: 1px solid #e2e8f0;
        background: #ffffff;
        color: #0f172a;
        border-radius: 8px;
        cursor: pointer;
        font-size: 13px;
        font-weight: 500;
        transition: background 120ms, border-color 120ms;
      }
      button:hover { background: #f8fafc; border-color: #cbd5e1; }
      button.primary {
        background: linear-gradient(135deg, #2563eb 0%, #4f46e5 100%);
        color: white;
        border-color: transparent;
        font-weight: 600;
      }
      button.primary:hover { opacity: 0.92; }
      button:disabled { opacity: 0.5; cursor: default; }
      #status {
        margin-top: 8px;
        font-size: 12px;
        color: #64748b;
        min-height: 16px;
        line-height: 1.5;
      }
      #status.error { color: #dc2626; }
      #status.ok { color: #15803d; }
    </style>
  </head>
  <body>
    <h1>cart_maker</h1>
    <p class="muted">
      Splits your iHerb cart into smaller orders that stay under the tax-free
      limit while keeping iHerb's free shipping.
    </p>

    <button id="overlay-btn" class="primary">Open planner on cart</button>
    <button id="preview-btn">Preview scrape</button>
    <button id="diagnose-btn">Diagnose</button>

    <div id="status"></div>

    <script src="popup.js"></script>
  </body>
</html>
